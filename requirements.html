<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>募集要項 | prototype</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="recruit.css">
</head>
<body style="background-color: var(--bg-recruit);">

  <header class="hero__header-bg" style="position: fixed;"></header>

  <main>
    <section class="recruit-hero">
      <div class="l-container">
        <p class="recruit-hero__eyebrow">Requirements</p>
        <h1 class="recruit-hero__title">募集要項</h1>
      </div>
    </section>

    <nav class="tab-menu l-container">
      <ul class="tab-menu__list">
        <li class="tab-menu__item is-active">
          <button type="button">
            <span class="tab-menu__main">税理士補助</span>
            <span class="tab-menu__sub">経験者採用</span>
          </button>
        </li>
        <li class="tab-menu__item">
          <button type="button">
            <span class="tab-menu__main">税理士補助</span>
            <span class="tab-menu__sub">未経験者採用</span>
          </button>
        </li>
        <li class="tab-menu__item">
          <button type="button">
            <span class="tab-menu__main">税理士補助</span>
            <span class="tab-menu__sub">パート採用</span>
          </button>
        </li>
      </ul>
    </nav>

    <section class="recruit-detail l-container">
      <dl class="recruit-list">
        <div class="recruit-list__row"><dt>業務内容</dt><dd>帳簿・決算のレビュー、担当顧問先へオンラインでの月次・年次報告</dd></div>
        <div class="recruit-list__row"><dt>応募条件</dt><dd>会計事務所での実務経験1年以上</dd></div>
        <div class="recruit-list__row"><dt>給与・待遇</dt><dd>年収380万〜640万　※前職を考慮します</dd></div>
        <div class="recruit-list__row"><dt>勤務時間</dt><dd>8:00〜18:00の間で8h（休憩45分含む）※みなし残業時間11h</dd></div>
        <div class="recruit-list__row"><dt>休日・休暇</dt><dd>完全週休二日制（土日祝）、年末年始、夏季、試験休暇あり</dd></div>
        <div class="recruit-list__row"><dt>勤務地</dt><dd>リモートワーク（週2回程度出社あり：事務所所在地は〇〇）</dd></div>
        <div class="recruit-list__row"><dt>雇用形態</dt><dd>正社員（試用期間3ヶ月）</dd></div>
        <div class="recruit-list__row"><dt>選考プロセス</dt><dd>書類選考 → 面接（1〜2回）→ 内定</dd></div>
      </dl>
    </section>
  </main>
  
  <p class="unko">うんこ</p>
</body>
</html>
